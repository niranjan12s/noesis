server:
  port: 8081

spring:
  application:
    name: noesis

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: noesis-consumer-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.noesis.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

  # ── PostgreSQL & JPA ──────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/noesis
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true

  # ── Redis ─────────────────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

# ── Noesis Application Properties ───────────────────────────────────────────
noesis:
  opensearch:
    host: localhost
    port: 9200
    scheme: http

  llm:
    provider: ${NOESIS_LLM_PROVIDER:groq}
    gemini-api-key: ${GEMINI_API_KEY:}
    openai-api-key: ${OPENAI_API_KEY:}
    openai-base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    base-url: ${NOESIS_LLM_BASE_URL:http://localhost:11434}
    model: ${NOESIS_LLM_MODEL:llama-3.1-8b-instant}
    embedding-model: llama3.2:1b
    timeout-seconds: 120
    rate-limiter:
      enabled: true
      max-calls-per-minute: 15

  auto-approve:
    threshold: 0

  watch:
    dir: ./noesis
    extensions:
      - .md
      - .txt
      - .xlsx

  traversal:
    max-depth: 3
    cache-ttl-seconds: 300

  chunker:
    text-window-size: 512
    text-window-overlap: 64

  dedup:
    ttl-hours: 168

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoint:
    health:
      show-details: always

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  file:
    name: "logs/noesis.log"
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"



